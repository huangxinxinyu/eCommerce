version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0.33
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_store
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=2000
      - --max_connect_errors=100
    networks:
      - ecommerce-net

  # Redis 缓存
  redis:
    image: redis:7.2-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ecommerce-net

  # Nacos 注册中心 & 配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: ecommerce-nacos
    restart: always
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false
      NACOS_AUTH_ENABLE: false
      JVM_XMS: 512m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql
    volumes:
      - ./docker/nacos/logs:/home/nacos/logs
      - ./docker/nacos/data:/home/nacos/data
    networks:
      - ecommerce-net

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.0
    container_name: ecommerce-rocketmq-namesrv
    restart: always
    environment:
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    ports:
      - "9876:9876"
    volumes:
      - ./docker/rocketmq/namesrv/logs:/home/rocketmq/logs
      - ./docker/rocketmq/namesrv/store:/home/rocketmq/store
    command: sh mqnamesrv
    networks:
      - ecommerce-net

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:5.1.0
    container_name: ecommerce-rocketmq-broker
    restart: always
    environment:
      JAVA_OPT_EXT: "-Xms1g -Xmx1g"
    ports:
      - "10911:10911"
      - "10909:10909"
    volumes:
      - ./docker/rocketmq/broker/logs:/home/rocketmq/logs
      - ./docker/rocketmq/broker/store:/home/rocketmq/store
      - ./docker/rocketmq/broker/conf/broker.conf:/home/rocketmq/conf/broker.conf
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    networks:
      - ecommerce-net

  # RocketMQ Dashboard (可选)
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: ecommerce-rocketmq-dashboard
    restart: always
    environment:
      JAVA_OPTS: "-Xms256m -Xmx256m -Dcom.rocketmq.config.accessKey= -Dcom.rocketmq.config.secretKey="
      ROCKETMQ_CONFIG_NAMESRVADDR: rocketmq-namesrv:9876
    ports:
      - "8085:8080"
    depends_on:
      - rocketmq-namesrv
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge