server:
  port: 8084

spring:
  application:
    name: email-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml

dubbo:
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: 20884

rocketmq:
  name-server: localhost:9876
  consumer:
    group: email-consumer-group

management:
  endpoints:
    web:
      exposure:
        include: "*"
